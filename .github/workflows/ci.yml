name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # --- Build & Test ---

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock', '.github/workflows/ci.yml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock', '.github/workflows/ci.yml') }}-
            ${{ runner.os }}-cargo-

      - name: cargo test --no-run
        run: cargo test --no-run

  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock', '.github/workflows/ci.yml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock', '.github/workflows/ci.yml') }}-
            ${{ runner.os }}-cargo-

      - name: cargo test
        run: cargo test

  # --- Release binary for integration tests (linux only) ---

  release-binary:
    name: Release Binary
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install musl tools
        run: sudo apt-get install -y musl-tools

      - name: Cache cargo registry + release build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock', '.github/workflows/ci.yml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock', '.github/workflows/ci.yml') }}-
            ${{ runner.os }}-cargo-release-

      - name: Build release binary
        run: ./release.sh --target x86_64-unknown-linux-musl

      - name: Read version
        id: version
        run: echo "version=$(cargo pkgid | sed 's/.*[#@]//')" >> "$GITHUB_OUTPUT"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: zizq-binary-v${{ steps.version.outputs.version }}
          path: target/release/zizq-*-linux-x86_64.tar.gz

  # --- Integration tests against client repos ---

  discover-node:
    name: Discover Node Versions
    needs: release-binary
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5

      - name: Discover compatible client versions
        id: discover
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          matrix=$(./.github/scripts/discover-client-versions.sh \
            node "${{ needs.release-binary.outputs.version }}")
          echo "Discovered matrix: $matrix"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  integration-node:
    name: Integration (Node, ${{ matrix.label }})
    needs: [release-binary, discover-node]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.discover-node.outputs.matrix) }}
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: zizq-binary-v${{ needs.release-binary.outputs.version }}
          path: server
      - name: Unpack server binary
        run: tar -xzf server/zizq-*-linux-x86_64.tar.gz -C server

      - name: Checkout Node client @ ${{ matrix.ref }}
        uses: actions/checkout@v5
        with:
          repository: zizq-labs/zizq-node
          ref: ${{ matrix.ref }}
          path: client
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: latest
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Prepare artifact directory
        run: mkdir -p artifact

      - name: Download release tarball (tagged version)
        if: matrix.tarball != ''
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          gh release download "${{ matrix.ref }}" \
            --repo zizq-labs/zizq-node \
            --pattern "${{ matrix.tarball }}" \
            --dir artifact

      - name: Build client from source (main)
        if: matrix.tarball == ''
        working-directory: client
        run: |
          ./release.sh
          cp target/release/zizq-*.tgz ../artifact/

      - name: Run integration tests
        working-directory: client
        run: |
          ./integration/run.sh \
            --binary ${{ github.workspace }}/server/zizq \
            --tarball ${{ github.workspace }}/artifact/zizq-*.tgz

  discover-ruby:
    name: Discover Ruby Versions
    needs: release-binary
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5

      - name: Discover compatible client versions
        id: discover
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          matrix=$(./.github/scripts/discover-client-versions.sh \
            ruby "${{ needs.release-binary.outputs.version }}")
          echo "Discovered matrix: $matrix"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  integration-ruby:
    name: Integration (Ruby, ${{ matrix.label }})
    needs: [release-binary, discover-ruby]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.discover-ruby.outputs.matrix) }}
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: zizq-binary-v${{ needs.release-binary.outputs.version }}
          path: server
      - name: Unpack server binary
        run: tar -xzf server/zizq-*-linux-x86_64.tar.gz -C server

      - name: Checkout Ruby client @ ${{ matrix.ref }}
        uses: actions/checkout@v5
        with:
          repository: zizq-labs/zizq-ruby
          ref: ${{ matrix.ref }}
          path: client
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: client

      - name: Prepare artifact directory
        run: mkdir -p artifact

      - name: Download release gem (tagged version)
        if: matrix.tarball != ''
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          gh release download "${{ matrix.ref }}" \
            --repo zizq-labs/zizq-ruby \
            --pattern "${{ matrix.tarball }}" \
            --dir artifact

      - name: Build client from source (main)
        if: matrix.tarball == ''
        working-directory: client
        run: |
          ./release.sh
          cp target/release/zizq-*.gem ../artifact/

      - name: Run integration tests
        working-directory: client
        run: |
          ./integration/run.sh \
            --binary ${{ github.workspace }}/server/zizq \
            --gem ${{ github.workspace }}/artifact/zizq-*.gem

  # --- Multi-platform release build (only runs on approval) ---

  release-all-platforms:
    name: Release (${{ matrix.platform }})
    needs: [integration-node, integration-ruby]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: release
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            platform: linux-x86_64
            deps: sudo apt-get install -y musl-tools
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
            platform: linux-arm64
            deps: sudo apt-get install -y musl-tools
          - target: x86_64-pc-windows-gnu
            runner: ubuntu-latest
            platform: windows-x86_64
            deps: sudo apt-get install -y gcc-mingw-w64-x86-64
          - target: aarch64-apple-darwin
            runner: macos-14
            platform: macos-arm64
            deps: ""
          - target: x86_64-apple-darwin
            runner: macos-14
            platform: macos-x86_64
            deps: ""
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + release build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ matrix.platform }}-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock', '.github/workflows/ci.yml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-${{ matrix.platform }}-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock', '.github/workflows/ci.yml') }}-
            ${{ runner.os }}-cargo-release-${{ matrix.platform }}-

      - name: Install build dependencies
        if: matrix.deps != ''
        run: ${{ matrix.deps }}

      - name: Build release binary
        run: ./release.sh --target ${{ matrix.target }}

      - name: Upload platform artifact
        uses: actions/upload-artifact@v7
        with:
          name: zizq-release-${{ matrix.platform }}
          path: target/release/zizq-*

  # --- Publish GitHub Release (runs after all platforms built) ---

  publish:
    name: Publish Release
    needs: release-all-platforms
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Read version
        id: version
        run: echo "version=$(cargo pkgid | sed 's/.*[#@]//')" >> "$GITHUB_OUTPUT"

      - name: Download all release artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: zizq-release-*
          path: artifacts
          merge-multiple: true

      - name: Extract release notes from CHANGELOG
        run: |
          version=${{ steps.version.outputs.version }}
          # Extract the section for this version (between ## headers).
          sed -n "/^## ${version}/,/^## /p" CHANGELOG.md | head -n -1 | tail -n +2 > release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version=${{ steps.version.outputs.version }}
          gh release create "v${version}" \
            --title "v${version}" \
            --notes-file release-notes.md \
            artifacts/zizq-*
